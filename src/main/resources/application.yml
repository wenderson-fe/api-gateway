spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          # Habilita a criação automática de rotas no Spring Cloud Gateway
          # com base nos serviços registrados no Service Discovery (Eureka).
          enabled: true
          # Converte o ID do serviço registrado no Eureka para letras minúsculas
          # ao gerar as rotas automaticamente no Gateway.
          lower-case-service-id: true

# Porta em que a aplicação será executada.
server:
  port: 8080

eureka:
  client:
    serviceUrl:
      # URL do Eureka Server.
      # Se a variável EUREKA_ZONE existir, usa ela.
      # Se não, usa localhost (valor padrão após os dois pontos).
      defaultZone: ${EUREKA_ZONE:http://localhost:8081/eureka}

management:
  endpoint:
    # Habilita endpoints específicos do Spring Cloud Gateway
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        # Expõe explicitamente os endpoints do Actuator via HTTP
        # Tomar cuidado ao expor esses endpoints em produção
        include: "*"

springdoc:
  swagger-ui:
    # Define o endpoint personalizado para acessar a interface do Swagger no navegador.
    # Exemplo: http://localhost:8080/swagger-ui.html
    path: /swagger-ui.html
    urls:
      # Define o nome que aparecerá no seletor no canto superior direito do Swagger UI.
      - name: pedidos-api
        # Define o caminho (path) onde o Gateway buscará o JSON de documentação do serviço de Pedidos.
        url: /pedidos-api/v3/api-docs
      - name: pagamento-api
        url: /pagamento-api/v3/api-docs