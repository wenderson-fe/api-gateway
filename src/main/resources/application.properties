spring.application.name=gateway

# Porta em que a aplicańŃo serß executada.
server.port=8080

# URL do Eureka Server.
eureka.client.serviceUrl.defaultZone=http://localhost:8081/eureka

# Habilita a criańŃo automßtica de rotas no Spring Cloud Gateway
# com base nos servińos registrados no Service Discovery (Eureka).
spring.cloud.gateway.discovery.locator.enabled=true

# Converte o ID do servińo registrado no Eureka para letras min·sculas
# ao gerar as rotas automaticamente no Gateway.
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Habilita endpoints especĒficos do Spring Cloud Gateway
management.endpoint.gateway.enabled=true

# Exp§e explicitamente os endpoints do Actuator via HTTP
# Tomar cuidado ao expor esses endpoints em produńŃo
management.endpoints.web.exposure.include=*

# Define o endpoint personalizado para acessar a interface do Swagger no navegador.
# Exemplo: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# Define o nome que aparecerß no seletor no canto superior direito do Swagger UI.
springdoc.swagger-ui.urls[0].name=pedidos-api
# Define o caminho (path) onde o Gateway buscarß o JSON de documentańŃo do servińo de Pedidos.
springdoc.swagger-ui.urls[0].url=/pedidos-api/v3/api-docs

springdoc.swagger-ui.urls[1].name=pagamento-api
springdoc.swagger-ui.urls[1].url=/pagamento-api/v3/api-docs



